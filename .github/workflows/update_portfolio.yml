name: "💼 Mettre à jour le portfolio"

# ─────────────────────────────────────────────────────────────────────────────
# Workflow manuel pour mettre à jour config/portfolio.yaml après un trade.
#
# Comment l'utiliser :
#   1. Allez dans l'onglet Actions de votre repo GitHub
#   2. Cliquez sur "💼 Mettre à jour le portfolio" dans la sidebar gauche
#   3. Cliquez "Run workflow"
#   4. Remplissez les champs (actif, action, quantité)
#   5. Cliquez "Run workflow" (bouton vert)
#
# Le portfolio sera mis à jour et commité automatiquement. Le prochain rapport
# prendra en compte les nouvelles quantités.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      asset:
        description: "Symbole de l'actif (ex: BTC, ETH, SOL)"
        required: true
        type: string
      action:
        description: "Action à effectuer"
        required: true
        type: choice
        options:
          - buy   # Ajouter des unités à la position existante
          - sell  # Retirer des unités de la position existante
          - set   # Fixer la quantité à une valeur exacte
          - add   # Ajouter un NOUVEL actif au portfolio
      quantity:
        description: "Quantité (ex: 0.01 pour BTC, 1000 pour JASMY)"
        required: true
        type: string
      tier:
        description: "Tier (uniquement pour 'add' — nouvel actif)"
        required: false
        type: choice
        default: "3"
        options:
          - "1"  # Analyse deep
          - "2"  # Analyse condensée
          - "3"  # Silence sauf >10%
          - "4"  # Poussière
      coingecko_id:
        description: "ID CoinGecko (uniquement pour 'add' — ex: solana)"
        required: false
        type: string
      notes:
        description: "Note libre (optionnel)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Mettre à jour le portfolio
        # v29 (audit sécurité) — les inputs ne sont JAMAIS interpolés dans le
        # shell (injection GHA classique : une apostrophe dans « notes » cassait
        # la commande, un input forgé exécutait du code avec contents:write).
        # Ils passent par l'environnement, et l'`eval` est supprimé.
        env:
          IN_ASSET: ${{ inputs.asset }}
          IN_ACTION: ${{ inputs.action }}
          IN_QUANTITY: ${{ inputs.quantity }}
          IN_TIER: ${{ inputs.tier }}
          IN_CGID: ${{ inputs.coingecko_id }}
          IN_NOTES: ${{ inputs.notes }}
        run: |
          set -- --asset "$IN_ASSET" --action "$IN_ACTION" --quantity "$IN_QUANTITY"
          if [ "$IN_ACTION" = "add" ]; then
            set -- "$@" --tier "$IN_TIER"
            if [ -n "$IN_CGID" ]; then
              set -- "$@" --coingecko-id "$IN_CGID"
            fi
          fi
          if [ -n "$IN_NOTES" ]; then
            set -- "$@" --notes "$IN_NOTES"
          fi
          python scripts/update_portfolio.py "$@"

      - name: Commit et push
        env:
          IN_ASSET: ${{ inputs.asset }}
          IN_ACTION: ${{ inputs.action }}
          IN_QUANTITY: ${{ inputs.quantity }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/
          if git diff --cached --quiet; then
            echo "Aucun changement détecté."
            exit 0
          fi
          ASSET=$(echo "$IN_ASSET" | tr '[:lower:]' '[:upper:]')
          git commit -m "portfolio: ${IN_ACTION} ${IN_QUANTITY} ${ASSET} [skip ci]"
          git push
          echo "✅ Commit poussé : ${IN_ACTION} ${IN_QUANTITY} ${ASSET}"
