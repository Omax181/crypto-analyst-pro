name: Morning Crypto Report

on:
  schedule:
    # 8h30 Casablanca (UTC+1) = 7h30 UTC. Note : pendant le Ramadan le Maroc
    # repasse à UTC+0, l'envoi serait alors à 7h30 local (à ajuster si besoin).
    - cron: '30 7 * * *'
  # Déclenchement externe fiable via cron-job.org (POST repository_dispatch).
  # Le schedule GitHub natif est gardé en filet de sécurité (souvent en retard).
  # cron-job.org doit POSTer un event_type parmi les types ci-dessous :
  #   curl -X POST -H "Accept: application/vnd.github+json" \
  #        -H "Authorization: Bearer <PAT>" \
  #        https://api.github.com/repos/<owner>/<repo>/dispatches \
  #        -d '{"event_type":"morning-report"}'
  # NB : on accepte aussi les variantes underscore (morning_report, run_morning)
  # car un type non listé renvoie 202/204 SANS rien lancer (échec SILENCIEUX) —
  # cause classique d'un "job jamais déclenché" côté cron externe.
  repository_dispatch:
    types: [morning, morning-report, morning_report, run-morning, run_morning]
  workflow_dispatch:

# Évite deux exécutions simultanées si schedule et repository_dispatch tombent
# en même temps (sinon double email).
concurrency:
  group: morning-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run morning report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINMARKETCAP_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LUNARCRUSH_API_KEY: ${{ secrets.LUNARCRUSH_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python -m src.main morning
      - name: Commit state files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state/ 2>/dev/null || true
          # Rien à committer => sortie propre (ne fait pas échouer le job).
          if git diff --cached --quiet; then
            echo "Aucun changement de state à committer."
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"
          # Runs concurrents (schedule + dispatch quasi simultanés) : on rebase
          # avant de pousser pour NE PAS écraser le state d'un autre run, avec
          # quelques tentatives en cas de course sur la même branche.
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
              && git push && { echo "State poussé."; break; }
            echo "Push tentative $i échouée, nouvelle tentative dans 5s…"
            sleep 5
          done
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-morning
          path: logs/
