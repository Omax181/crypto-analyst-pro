name: Evening Crypto Report

on:
  # v15 — schedule GitHub natif RETIRÉ : cron-job.org déclenche déjà via
  # repository_dispatch, et les deux tombaient ensemble → MAILS EN DOUBLE.
  # Variantes underscore acceptées (un type non listé = 202 silencieux sans run).
  repository_dispatch:
    types: [evening, evening-report, evening_report, run-evening, run_evening]
  workflow_dispatch:

concurrency:
  group: evening-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run evening report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINMARKETCAP_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LUNARCRUSH_API_KEY: ${{ secrets.LUNARCRUSH_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          # v14 fix : clés lues par le code mais jamais transmises par les
          # workflows (secret defini cote repo = ignore sinon). Un secret
          # absent s'evalue en chaine vide -> sans effet tant qu'il n'existe pas.
          COINMETRICS_API_KEY: ${{ secrets.COINMETRICS_API_KEY }}
          COINGLASS_PAID: ${{ secrets.COINGLASS_PAID }}
          KAITO_API_KEY: ${{ secrets.KAITO_API_KEY }}
        run: python -m src.main evening
      - name: Commit state files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state/ 2>/dev/null || true
          # Rien à committer => sortie propre (ne fait pas échouer le job).
          if git diff --cached --quiet; then
            echo "Aucun changement de state à committer."
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"
          # Runs concurrents : rebase avant push pour ne pas écraser le state
          # d'un autre run, avec quelques tentatives en cas de course.
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
              && git push && { echo "State poussé."; break; }
            echo "Push tentative $i échouée, nouvelle tentative dans 5s…"
            sleep 5
          done
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-evening
          path: logs/
