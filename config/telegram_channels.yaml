# Canaux Telegram publics à scraper via Telethon.
# Nécessite TELEGRAM_API_ID, TELEGRAM_API_HASH, TELEGRAM_SESSION_STRING (secrets).
telegram_channels:
  watcher_guru:
    handle: "WatcherGuru"
    filter: false          # chaîne news généraliste rapide -> tout remonter
  brics_news:
    handle: "bricsnews"
    filter: true           # ne remonter que si mots-clés pertinents
  news_crypto:
    handle: "news_crypto"
    filter: false          # déjà spécialisée crypto
  etf_flows:
    handle: "ETF_Flows"
    filter: false          # flux ETF -> directement pertinent

keywords_filter:
  - payment
  - currency
  - crypto
  - digital
  - yuan
  - dollar
  - trade
  - sanction
  - bitcoin
  - stablecoin
  - etf
  - bond

settings:
  max_messages_per_channel: 15
  max_age_hours: 24
