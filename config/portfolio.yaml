# =============================================================================
# PORTFOLIO — source de vérité du PTF
# =============================================================================
# Tiers :
#   1 = analyse deep (mention si mouvement >5%, signal techn. fort, ou news)
#   2 = analyse condensée (mention si mouvement >5% ou news significative)
#   3 = silence sauf mouvement >10% ou news
#   4 = poussières : silence sauf spike >30% ou news critique
#
# value_usd = BASELINE (fallback). La valeur réelle affichée est recalculée
# dynamiquement à chaque run : quantité × prix live du marché. Si le prix live
# est indisponible, on retombe sur ce value_usd (= dernier snapshot connu).
#
# Portefeuille 100% crypto — AUCUN cash / réserve. La valeur du PTF =
# somme(quantité × prix live) des positions ci-dessous, exclusivement.
#
# `symbol` optionnel : par défaut on prend la clé (ex. RENDER -> RNDR).
# `target_pct` optionnel (v18) : cible d'allocation en % du PTF pour cette
#   position. Si renseigné, l'analyse calcule la sur/sous-pondération (gap vs
#   cible). Laisser vide tant que les cibles ne sont pas définies — le code gère
#   l'absence proprement (aucune cible = pas d'analyse d'allocation).
# `pru` (v21) : prix de revient unitaire moyen en USD, calculé depuis
#   l'historique Binance complet (coût moyen pondéré). Sert au P&L réel par
#   position (prix live vs pru). Mettre à jour à chaque achat/vente via le bot.
# Pour mettre à jour : éditer ce fichier puis git commit && git push.
# =============================================================================

meta:
  base_currency: "USD"
  notes: "Portefeuille 100% crypto, aucun cash. Valeur = somme(quantite x prix live), recalculee a chaque run. Les value_usd ci-dessous sont un fallback (dernier snapshot connu). pru = cout moyen pondere (historique Binance)."

