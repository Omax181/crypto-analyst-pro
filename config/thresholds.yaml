# =============================================================================
# THRESHOLDS — seuils d'alerte, pondérations de scoring, logique métier
# =============================================================================

# --- Logique "silence sur l'inactif" : seuil de mouvement 24h par tier ---
mention_thresholds_pct:
  1: 5.0
  2: 5.0
  3: 10.0
  4: 30.0

# Un coin est mentionné si l'une de ces conditions est vraie :
#   - |change_24h| > mention_thresholds_pct[tier]
#   - news_score > news_score_to_mention
#   - tier 1 ET signal technique fort (STRONG_BUY/STRONG_SELL)
#   - santé en dégradation (health_change == WORSENING)
news_score_to_mention: 0.7

# --- Alertes intra-day ---
intraday_alerts:
  price_spike_threshold_pct: 30.0   # variation sur la fenêtre courte
  spike_window_hours: 4
  ultra_urgent_keywords:
    - hack
    - exploit
    - rug
    - rugpull
    - delisting
    - delist
    - regulatory action
    - ban
    - sec lawsuit
    - lawsuit
    - halt
    - depeg
    - insolvency
    - bankruptcy

# --- Pondérations du score composite (somme = 1.0) ---
composite_weights:
  technical: 0.30
  on_chain: 0.20
  fundamental: 0.20
  sentiment: 0.15
  macro_alignment: 0.15

# --- Pondération des timeframes pour le score technique (somme = 1.0) ---
technical_timeframe_weights:
  "1w": 0.40
  "1d": 0.30
  "4h": 0.20
  "1h": 0.10

# Mapping recommandation TradingView -> score 0-100
tv_signal_scores:
  STRONG_BUY: 100
  BUY: 75
  NEUTRAL: 50
  SELL: 25
  STRONG_SELL: 0

# --- Santé projet : critères critiques (verdict "sors-en") ---
project_health:
  critical:
    dev_zero_commits_days: 60
    site_down_days: 30
    founder_silence_days: 90
    min_total_liquidity_usd: 500000
  warning:
    dev_activity_ratio_min: 0.30      # <30% de la moyenne 12 mois
    volume_drop_90d_pct: -70.0        # chute >70% du volume sur 90j
    inflation_rate_max_pct: 20.0

# --- Détermination du style de rapport (calme / normal / agité) ---
report_style:
  weights:
    macro_high_impact_event: 30       # par événement high-impact aujourd'hui
    positions_moving: 30              # si >3 positions bougent significativement
    narrative_shift: 20
    major_news: 20                    # si >5 news majeures
  positions_moving_min: 3
  major_news_min: 5
  calm_max: 30
  normal_max: 60

# --- Cache (TTL en secondes) ---
cache_ttl:
  prices: 300        # 5 min
  technical: 600     # 10 min
  macro: 3600        # 1 h
  dev_activity: 14400  # 4 h
  news: 900          # 15 min
  youtube: 21600     # 6 h

# ============================================================
# REFACTOR V2 · seuils adaptatifs et pondérations de signaux
# ============================================================

# Seuils de signaux convergents requis pour une reco FERME, par tier.
signal_thresholds:
  btc_eth:            # Tier 0 (BTC, ETH) — déterminé dynamiquement
    firm_reco_min_signals: 4
  tier_1:             # value_usd > 50
    firm_reco_min_signals: 3
  tier_2:             # 10 <= value_usd <= 50
    firm_reco_min_signals: 2
  tier_3:             # 1 <= value_usd < 10
    firm_reco_min_signals: 2
  tier_4:             # value_usd < 1 (poussières)
    firm_reco_min_signals: 999   # jamais de reco ferme
    spike_threshold_pct: 30

# Pondérations des 9 signaux du score composite (somme = 1.0).
# IMPORTANT : les commits GitHub sont un sous-élément de "fundamental" et
# ne peuvent dépasser 50% de ce poids -> ~5% du total.
signal_weights:
  technical_multi_tf: 0.20
  volume_anomaly: 0.10
  onchain_flows: 0.15
  derivatives: 0.15
  sector_rotation: 0.10
  news_24h: 0.10
  social_sentiment: 0.05
  fundamental: 0.10
  macro_alignment: 0.05

# Mapping niveau de confiance -> taille d'action (bornes en %).
confidence_to_action:
  - {min: 85, max: 100, label: "taille pleine · 8-10% PTF", firm: true}
  - {min: 70, max: 84,  label: "taille standard · 4-6% PTF", firm: true}
  - {min: 55, max: 69,  label: "taille modérée · 2-3% PTF", firm: true}
  - {min: 40, max: 54,  label: "pas d'action · surveiller avec trigger", firm: false}
  - {min: 0,  max: 39,  label: "silence · pas de mention", firm: false}

# Panic mode (remplace les alertes intraday régulières).
panic_mode:
  btc_1h_abs_pct: 15        # BTC ±15% en 1h
  asset_1h_drop_pct: -25    # token PTF -25% en 1h
  liquidation_cascade_usd: 500000000
  hack_keywords: ["hack", "exploit", "breach"]
  anti_spam_minutes: 60
