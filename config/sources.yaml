# --- Repos GitHub par crypto (dev activity = signal santé) ---
github_repos:
  BTC: ["bitcoin/bitcoin"]
  ETH: ["ethereum/go-ethereum", "ethereum/solidity"]
  TAO: ["opentensor/bittensor"]
  RENDER: []
  LINK: ["smartcontractkit/chainlink"]
  INJ: ["InjectiveFoundation/injective-core"]
  STX: ["stacks-network/stacks-core"]
  QNT: []                       # repo privé / pas de repo public connu
  XRP: ["XRPLF/rippled"]
  FET: ["fetchai/fetchd"]
  CFX: ["Conflux-Chain/conflux-rust"]
  RSR: ["reserve-protocol/protocol"]
  CKB: ["nervosnetwork/ckb"]
  ANKR: ["Ankr-network/ankr.js"]
  JASMY: []
  ATOM: ["cosmos/gaia"]
  HBAR: ["hashgraph/hedera-services"]
  IMX: ["immutable/imx-core-sdk"]
  ADA: ["IntersectMBO/cardano-node"]
  GRT: ["graphprotocol/graph-node"]
  ARB: ["OffchainLabs/nitro"]
  AR: ["ArweaveTeam/arweave"]
  AXL: ["axelarnetwork/axelar-core"]
  ZK: ["matter-labs/zksync-era"]
  FIL: ["filecoin-project/lotus"]

# --- FRED series IDs (macro USA) ---
fred_series:
  fed_funds: DFF
  us_10y: DGS10
  us_2y: DGS2
  yield_curve: T10Y2Y
  dxy: DTWEXBGS
  vix: VIXCLS
  cpi: CPIAUCSL
  core_pce: PCEPILFE
  m2: M2SL
  unemployment: UNRATE
  # --- V6 : actifs macro hors-crypto (corrélations marché) ---
  sp500: SP500          # S&P 500 (clôture quotidienne)
  nasdaq: NASDAQCOM     # NASDAQ Composite
  gold: GOLDPMGBD228NLBM # Or LBMA PM fix USD/once (fallback ; prix live = Yahoo GC=F)
  wti: DCOILWTICO       # Pétrole WTI (USD/baril)
  brent: DCOILBRENTEU   # Pétrole Brent (USD/baril)
  eur_usd: DEXUSEU      # EUR/USD
  usd_jpy: DEXJPUS      # USD/JPY (yen, carry trade)

# --- Subreddits sentiment social ---
reddit_subreddits:
  - cryptocurrency
  - bitcoin
  - ethereum
  - CryptoMarkets

