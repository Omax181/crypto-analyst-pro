  GRT: the-graph
  ARB: arbitrum
  AR: arweave
  NOT: notcoin
  AXL: axelar
  ZK: zksync
  SATS: sats-ordinals
  FIL: filecoin

# --- Ticker exchange pour TradingView / Binance (paire USDT par défaut) ---
